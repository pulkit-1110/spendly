{% extends "base.html" %}

{% block title %}Edit expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Edit expense</h1>
            <p class="auth-subtitle">Update the details of this transaction.</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" step="0.01" min="0.01"
                           placeholder="0.00"
                           value="{{ request.form.amount or expense.amount }}"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        {% set selected_category = request.form.category or expense.category %}
                        <option value="" disabled {% if not selected_category %}selected{% endif %}>Choose a category</option>
                        {% for c in categories %}
                            <option value="{{ c }}" {% if selected_category == c %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ request.form.date or expense.date }}"
                           required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description"
                           class="form-input" maxlength="200"
                           placeholder="e.g. Lunch at cafe"
                           value="{{ request.form.description or expense.description or '' }}">
                </div>
                <button type="submit" class="btn-submit">Save changes</button>
            </form>
        </div>

        <p class="auth-switch">
            Changed your mind?
            <a href="{{ url_for('profile') }}">Back to profile</a>
        </p>

    </div>
</section>

{% endblock %}
