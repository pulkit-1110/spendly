{% extends "base.html" %}

{% block title %}Add expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Add an expense</h1>
            <p class="auth-subtitle">Log a new transaction to keep your records sharp.</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" step="0.01" min="0.01"
                           placeholder="0.00"
                           value="{{ request.form.amount or '' }}"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled {% if not request.form.category %}selected{% endif %}>Choose a category</option>
                        {% for c in categories %}
                            <option value="{{ c }}" {% if request.form.category == c %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ request.form.date or today }}"
                           required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description"
                           class="form-input" maxlength="200"
                           placeholder="e.g. Lunch at cafe"
                           value="{{ request.form.description or '' }}">
                </div>
                <button type="submit" class="btn-submit">Save expense</button>
            </form>
        </div>

        <p class="auth-switch">
            Changed your mind?
            <a href="{{ url_for('profile') }}">Back to profile</a>
        </p>

    </div>
</section>

{% endblock %}
